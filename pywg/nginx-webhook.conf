server {
    listen 443 ssl;
    server_name bot.YOUR_DOMAIN_HERE;

    ssl_certificate     /etc/letsencrypt/live/bot.YOUR_DOMAIN_HERE/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bot.YOUR_DOMAIN_HERE/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass         http://127.0.0.1:8443;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }
}

server {
    listen 80;
    server_name bot.YOUR_DOMAIN_HERE;
    return 301 https://$host$request_uri;
}
